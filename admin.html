<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmaciones · Mis XV Años</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#FBEAEE; --blush-2:#F6D8DF; --rosa:#E9AABB; --rosa-deep:#C97D95;
    --vino:#8B4F62; --oro:#B8935C; --tinta:#6E4B54; --tinta-suave:#9C7680; --blanco:#fff;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh; font-family:'Jost',sans-serif; color:var(--tinta);
    background:radial-gradient(1000px 500px at 10% -10%, var(--blush-2), transparent 60%), var(--blush);
    padding:6vh 5vw;
  }
  h1{ font-family:'Cormorant Garamond',serif; color:var(--vino); font-size:2rem; margin:0 0 4px; }
  p.sub{ color:var(--tinta-suave); margin:0 0 30px; font-size:.9rem; }

  .key-box{ display:flex; gap:10px; max-width:420px; margin-bottom:30px; flex-wrap:wrap; }
  .key-box input{
    flex:1; min-width:200px; padding:10px 12px; border:1px solid var(--blush-2);
    border-radius:4px; font-family:'Jost',sans-serif; font-size:.9rem;
  }
  .key-box button, .toolbar button{
    border:0; background:var(--vino); color:var(--blush); padding:10px 18px;
    border-radius:4px; cursor:pointer; font-size:.85rem; letter-spacing:.04em;
  }
  .key-box button:hover, .toolbar button:hover{ background:var(--rosa-deep); }

  .summary{ display:flex; gap:16px; flex-wrap:wrap; margin-bottom:24px; }
  .summary .card{
    background:var(--blanco); border:1px solid var(--blush-2); border-radius:6px;
    padding:16px 22px; min-width:140px; box-shadow:0 12px 30px -22px rgba(139,79,98,.4);
  }
  .summary .card strong{ display:block; font-family:'Cormorant Garamond',serif; font-size:1.8rem; color:var(--vino); }
  .summary .card span{ font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--tinta-suave); }

  .toolbar{ margin-bottom:16px; }

  table{ width:100%; border-collapse:collapse; background:var(--blanco); border-radius:6px; overflow:hidden; box-shadow:0 12px 30px -22px rgba(139,79,98,.4); }
  th, td{ text-align:left; padding:12px 14px; font-size:.85rem; border-bottom:1px solid var(--blush); }
  th{ background:var(--blush-2); color:var(--vino); font-weight:500; letter-spacing:.04em; text-transform:uppercase; font-size:.7rem; }
  tr:last-child td{ border-bottom:0; }
  .pill{ display:inline-block; padding:3px 10px; border-radius:20px; font-size:.72rem; letter-spacing:.03em; }
  .pill.si{ background:#E4EFE2; color:#4E7A48; }
  .pill.no{ background:#F5E1E0; color:#B3413E; }
  .empty, .error{ color:var(--tinta-suave); font-size:.9rem; }
  .error{ color:#B3413E; }
</style>
</head>
<body>

<h1>Confirmaciones de asistencia</h1>
<p class="sub">Panel privado — solo visible con la clave de administrador.</p>

<div class="key-box">
  <input type="password" id="keyInput" placeholder="Clave de administrador">
  <button id="loadBtn">Ver confirmaciones</button>
  <button id="exportBtn" type="button">Exportar CSV</button>
</div>

<div id="summary" class="summary"></div>
<div id="tableWrap"><p class="empty">Ingresa la clave para ver las confirmaciones.</p></div>

<script>
  const keyInput = document.getElementById('keyInput');
  const loadBtn = document.getElementById('loadBtn');
  const exportBtn = document.getElementById('exportBtn');
  const summaryEl = document.getElementById('summary');
  const tableWrap = document.getElementById('tableWrap');

  const savedKey = localStorage.getItem('admin_key');
  if (savedKey) keyInput.value = savedKey;

  function fmtDate(iso){
    try { return new Date(iso).toLocaleString('es-CO'); } catch { return iso; }
  }

  async function loadRsvps(){
    const key = keyInput.value.trim();
    if (!key){ tableWrap.innerHTML = '<p class="error">Ingresa una clave.</p>'; return; }
    localStorage.setItem('admin_key', key);

    tableWrap.innerHTML = '<p class="empty">Cargando…</p>';
    try {
      const res = await fetch(`/api/rsvp?key=${encodeURIComponent(key)}`);
      if (res.status === 401){
        tableWrap.innerHTML = '<p class="error">Clave incorrecta.</p>';
        summaryEl.innerHTML = '';
        return;
      }
      const data = await res.json();
      renderSummary(data.resumen);
      renderTable(data.rsvps);
    } catch (err){
      tableWrap.innerHTML = '<p class="error">No se pudo conectar con el servidor.</p>';
    }
  }

  function renderSummary(r){
    if (!r){ summaryEl.innerHTML = ''; return; }
    summaryEl.innerHTML = `
      <div class="card"><strong>${r.total}</strong><span>Respuestas</span></div>
      <div class="card"><strong>${r.confirman}</strong><span>Confirman</span></div>
      <div class="card"><strong>${r.declinan}</strong><span>No asisten</span></div>
      <div class="card"><strong>${r.invitados_totales}</strong><span>Invitados totales</span></div>
    `;
  }

  function renderTable(list){
    if (!list || !list.length){
      tableWrap.innerHTML = '<p class="empty">Aún no hay confirmaciones.</p>';
      return;
    }
    const rows = list.map(r => `
      <tr>
        <td>${escapeHtml(r.nombre)}</td>
        <td>${escapeHtml(r.telefono || '—')}</td>
        <td><span class="pill ${r.asistencia}">${r.asistencia === 'si' ? 'Asiste' : 'No asiste'}</span></td>
        <td>${escapeHtml(r.mensaje || '—')}</td>
        <td>${fmtDate(r.creado)}</td>
      </tr>
    `).join('');

    tableWrap.innerHTML = `
      <table>
        <thead><tr><th>Nombre</th><th>Teléfono</th><th>Asistencia</th><th>Mensaje</th><th>Fecha</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  loadBtn.addEventListener('click', loadRsvps);
  keyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadRsvps(); });
  exportBtn.addEventListener('click', () => {
    const key = keyInput.value.trim();
    if (!key){ alert('Ingresa la clave primero.'); return; }
    window.open(`/api/rsvp-export?key=${encodeURIComponent(key)}`, '_blank');
  });

  if (savedKey) loadRsvps();
</script>
</body>
</html>
